  <!-- No visible content needed for utilities -->

  <script>
    /**
     * Helper function to close the window if possible, otherwise redirect to the specified URL.
     * @param {string} redirectUrl - The URL to redirect to if the window cannot be closed.
     */
    function closeOrRedirect(redirectUrl) {
        console.log('Attempting closeOrRedirect with URL:', redirectUrl);
        
        // Add a fallback timeout to force redirect after 3 seconds
        const fallbackTimeout = setTimeout(() => {
            console.log('Fallback timeout triggered - forcing redirect');
            window.location.href = redirectUrl;
        }, 3000);

        if (google && google.script && google.script.host) {
            try {
                console.log('Attempting to close via google.script.host');
                google.script.host.close();
                clearTimeout(fallbackTimeout);
            } catch (error) {
                console.error('Failed to close via google.script.host:', error);
                window.location.href = redirectUrl;
                clearTimeout(fallbackTimeout);
            }
        } else {
            console.log('Direct redirect - no google.script.host available');
            window.location.href = redirectUrl;
            clearTimeout(fallbackTimeout);
        }
    }
