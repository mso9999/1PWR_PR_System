<!-- Security Headers Template v1.4 -->

<?!= include('style'); ?>

<script>
// Safe navigation handling
function safeNavigate(url) {
  try {
    if (!url) return;
    
    // Only allow specific domains
    const allowedDomains = [
      'script.google.com',
      'googleusercontent.com'
    ];
    
    const urlObj = new URL(url);
    const isDomainAllowed = allowedDomains.some(domain => 
      urlObj.hostname.endsWith(domain)
    );
    
    if (!isDomainAllowed) {
      console.error('Navigation blocked: domain not allowed');
      return;
    }
    
    // Use replace to avoid adding to browser history
    window.top.location.replace(url);
  } catch (error) {
    console.error('Navigation error:', error);
  }
}

// Handle form submissions
document.addEventListener('submit', function(e) {
  e.preventDefault();
  const form = e.target;
  safeNavigate(form.action);
});

// Disable MutationObserver for gas-hub
if (window.MutationObserver) {
  const originalObserve = MutationObserver.prototype.observe;
  MutationObserver.prototype.observe = function(target, options) {
    if (target && target.nodeType === Node.ELEMENT_NODE) {
      originalObserve.call(this, target, options);
    }
  };
}
</script>

<!-- Security Headers -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">

<!-- Content Security Policy -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://script.google.com https://*.googleusercontent.com;
  style-src 'self' 'unsafe-inline' https://script.google.com https://*.googleusercontent.com;
  frame-ancestors 'self' https://script.google.com;
  form-action 'self' https://script.google.com;
  base-uri 'self';
  connect-src 'self' https://script.google.com https://*.googleusercontent.com;
">
