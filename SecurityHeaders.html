<script nonce="<?!= nonce ?>">
// Patch MutationObserver to handle null/undefined targets safely
(function patchMutationObserver() {
  if (typeof MutationObserver !== 'undefined') {
    const OriginalMutationObserver = window.MutationObserver;
    
    window.MutationObserver = function(callback) {
      const instance = new OriginalMutationObserver(callback);
      
      const originalObserve = instance.observe;
      instance.observe = function(target, options) {
        if (!target) {
          console.warn('MutationObserver: Attempted to observe null/undefined target');
          return;
        }
        
        if (!(target instanceof Node)) {
          console.warn('MutationObserver: Target is not a valid Node');
          return;
        }
        
        return originalObserve.call(this, target, options);
      };
      
      return instance;
    };
    
    window.MutationObserver.prototype = OriginalMutationObserver.prototype;
  }
})();

// Safe navigation handling
function safeNavigate(url) {
  try {
    if (!url) return;
    
    // Only allow specific domains
    const allowedDomains = [
      'script.google.com',
      'googleusercontent.com'
    ];
    
    const urlObj = new URL(url);
    const isDomainAllowed = allowedDomains.some(domain => 
      urlObj.hostname.endsWith(domain)
    );
    
    if (!isDomainAllowed) {
      console.error('Navigation blocked: domain not allowed');
      return;
    }
    
    // Use replace to avoid adding to browser history
    window.top.location.replace(url);
  } catch (error) {
    console.error('Navigation error:', error);
  }
}

// Handle form submissions
document.addEventListener('submit', function(e) {
  e.preventDefault();
  const form = e.target;
  safeNavigate(form.action);
});
</script>

<meta http-equiv="X-XSS-Protection" content="1; mode=block">

<!-- Content Security Policy -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'nonce-<?!= nonce ?>' https://script.google.com https://*.googleusercontent.com;
  style-src 'self' 'unsafe-inline' https://script.google.com https://*.googleusercontent.com;
  frame-ancestors 'self' https://script.google.com;
  form-action 'self' https://script.google.com;
  base-uri 'self';
  connect-src 'self' https://script.google.com https://*.googleusercontent.com;
">
